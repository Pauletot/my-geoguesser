<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGeoguesser</title>
    
    <!--link for the map leaflet-->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!--link for the 360° image: pannellum-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <!--link for the file style.css-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--creation of the divisors-->
    <div id="landscape"></div>

    <div id="map"></div>

    <div id="interface">
        <!--pointsis static, span isolated the 0 so js can modify it-->
        <div id="points-box">Points: <span id="points">0</span></div>
        <button id="btn-enter" disabled>Guess</button>
    </div>

    <!--script load the js files-->
    <!--this link to the library leaflet: manage the map-->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!--this link for the library pannelum: trasform a flat image and to a 3d one-->
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <script src="app.js"></script>
</body>
</html>
